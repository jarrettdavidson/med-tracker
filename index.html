<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Med Tracker</title>

<!-- PWA Meta -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7BAE8E">

<!-- iOS Standalone App -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Med Tracker">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Prevent text selection on long-press for app feel -->
<meta name="format-detection" content="telephone=no">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0EB;
    --surface: #FFFFFF;
    --surface-hover: #F0EBE5;
    --border: #E0D8CF;
    --text: #3D3632;
    --text-muted: #9A8E84;
    --accent: #7BAE8E;
    --accent-dim: rgba(123, 174, 142, 0.14);
    --warning: #D4A84B;
    --warning-dim: rgba(212, 168, 75, 0.12);
    --danger: #C97B7B;
    --danger-dim: rgba(201, 123, 123, 0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: calc(100px + var(--safe-bottom));
    -webkit-user-select: none;
    user-select: none;
  }

  /* Allow text selection in inputs */
  input, textarea { -webkit-user-select: auto; user-select: auto; }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245, 240, 235, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: calc(16px + var(--safe-top)) 20px 16px;
  }

  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header h1 span { font-size: 20px; }

  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* Add Button */
  .add-btn {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 32px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(123, 174, 142, 0.35);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .add-btn:active { transform: scale(0.92); }

  /* Cards */
  .med-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .med-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
  }

  .med-card.status-good::before { background: var(--accent); }
  .med-card.status-warning::before { background: var(--warning); }
  .med-card.status-danger::before { background: var(--danger); }

  .med-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .med-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .med-dose {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .med-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .icon-btn:active { background: var(--surface-hover); }
  .icon-btn.delete:active { background: var(--danger-dim); color: var(--danger); }

  /* Progress Ring */
  .med-body {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .ring-wrap {
    position: relative;
    width: 72px;
    height: 72px;
    flex-shrink: 0;
  }

  .ring-wrap svg {
    transform: rotate(-90deg);
    width: 72px;
    height: 72px;
  }

  .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 5;
  }

  .ring-fg {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease, stroke 0.3s;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-count {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }

  .ring-unit {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  .med-info { flex: 1; min-width: 0; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 13px;
  }

  .info-row + .info-row { border-top: 1px solid rgba(224, 216, 207, 0.7); }

  .info-label { color: var(--text-muted); }

  .info-value { font-weight: 500; text-align: right; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .status-badge.good { background: var(--accent-dim); color: var(--accent); }
  .status-badge.warning { background: var(--warning-dim); color: var(--warning); }
  .status-badge.danger { background: var(--danger-dim); color: var(--danger); }

  /* Dose controls */
  .dose-controls {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 14px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  .dose-btn {
    height: 42px;
    flex: 1;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .dose-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .dose-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

  .dose-btn.take:active { background: var(--danger-dim); }
  .dose-btn.add:active { background: var(--accent-dim); }

  .dose-btn .emoji { font-size: 16px; }

  /* Order alert */
  .order-alert {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .order-alert.warn {
    background: var(--warning-dim);
    color: var(--warning);
  }

  .order-alert.critical {
    background: var(--danger-dim);
    color: var(--danger);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60, 54, 50, 0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 24px 20px calc(40px + var(--safe-bottom));
    animation: slideUp 0.3s ease;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 700;
  }

  .modal-close {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-hover);
    color: var(--text);
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .form-input:focus { border-color: var(--accent); }

  .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .form-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .submit-btn {
    width: 100%;
    height: 52px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
    -webkit-appearance: none;
  }

  .submit-btn:active { opacity: 0.85; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

  .empty-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .empty-sub { font-size: 14px; }

  /* History */
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(224, 216, 207, 0.6);
    font-size: 13px;
  }

  .history-action { font-weight: 500; }
  .history-date { color: var(--text-muted); font-size: 12px; }
  .history-action.took { color: var(--danger); }
  .history-action.added { color: var(--accent); }

  /* Frequency select */
  .freq-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .freq-opt {
    height: 42px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .freq-opt.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .freq-opt:active { transform: scale(0.96); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1><span>💊</span> Med Tracker</h1>
  <div class="header-sub" id="headerSub">No medications tracked</div>
</div>

<div class="container" id="medList"></div>

<button class="add-btn" onclick="openAddModal()" aria-label="Add medication">+</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Medication</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <form id="medForm" onsubmit="saveMed(event)">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Medication Name</label>
        <input class="form-input" id="medName" placeholder="e.g. Metformin" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Dosage / Strength</label>
        <input class="form-input" id="medDosage" placeholder="e.g. 500mg" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Frequency (doses per day)</label>
        <div class="freq-options" id="freqOptions">
          <button type="button" class="freq-opt" data-val="1">1× daily</button>
          <button type="button" class="freq-opt" data-val="2">2× daily</button>
          <button type="button" class="freq-opt" data-val="3">3× daily</button>
        </div>
        <div style="margin-top:8px">
          <input class="form-input" id="medFreqCustom" type="number" min="0.5" step="0.5" placeholder="Or enter custom (e.g. 0.5 for every other day)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Starting Count</label>
          <input class="form-input" id="medCount" type="number" min="0" placeholder="e.g. 90" required>
        </div>
        <div class="form-group">
          <label class="form-label">Lead Time (days)</label>
          <input class="form-input" id="medLeadTime" type="number" min="0" placeholder="e.g. 7">
          <div class="form-hint">Days from order to delivery</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Date Added</label>
        <input class="form-input" id="medDate" type="date" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Add Medication</button>
    </form>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="historyTitle">History</div>
      <button class="modal-close" onclick="closeHistoryModal()">✕</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// --- Register Service Worker for offline / PWA ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

const STORAGE_KEY = 'medTracker_v2';

function loadMeds() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveMeds(meds) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(meds));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function getStatus(med) {
  const freq = med.frequency || 1;
  const daysLeft = freq > 0 ? med.currentCount / freq : Infinity;
  const leadTime = med.leadTime || 0;
  if (med.currentCount <= 0) return 'danger';
  if (daysLeft <= leadTime) return 'danger';
  if (daysLeft <= leadTime + 7) return 'warning';
  return 'good';
}

function getStatusLabel(med) {
  const freq = med.frequency || 1;
  const daysLeft = freq > 0 ? Math.floor(med.currentCount / freq) : Infinity;
  const leadTime = med.leadTime || 0;
  if (med.currentCount <= 0) return { text: 'OUT', class: 'danger' };
  if (daysLeft <= leadTime) return { text: 'ORDER NOW', class: 'danger' };
  if (daysLeft <= leadTime + 7) return { text: 'ORDER SOON', class: 'warning' };
  return { text: `${daysLeft}d left`, class: 'good' };
}

function getOrderAlert(med) {
  const freq = med.frequency || 1;
  if (freq <= 0) return null;
  const daysLeft = Math.floor(med.currentCount / freq);
  const leadTime = med.leadTime || 0;
  if (leadTime <= 0) return null;
  const daysUntilOrder = daysLeft - leadTime;
  if (med.currentCount <= 0) {
    return { class: 'critical', text: '⚠️ Out of stock! Order immediately — ' + leadTime + ' day lead time.' };
  }
  if (daysUntilOrder <= 0) {
    return { class: 'critical', text: '🚨 Order now! Only ' + daysLeft + ' day' + (daysLeft!==1?'s':'') + ' supply left, refill takes ' + leadTime + ' days.' };
  }
  if (daysUntilOrder <= 7) {
    return { class: 'warn', text: '⏰ Order in ' + daysUntilOrder + ' day' + (daysUntilOrder!==1?'s':'') + ' to avoid running out (' + leadTime + '-day lead time).' };
  }
  return null;
}

function renderMeds() {
  const meds = loadMeds();
  const list = document.getElementById('medList');
  const sub = document.getElementById('headerSub');

  if (meds.length === 0) {
    list.innerHTML = '<div class="empty-state">' +
      '<div class="empty-icon">💊</div>' +
      '<div class="empty-title">No medications yet</div>' +
      '<div class="empty-sub">Tap + to add your first prescription</div>' +
      '</div>';
    sub.textContent = 'No medications tracked';
    return;
  }

  sub.textContent = meds.length + ' medication' + (meds.length!==1?'s':'') + ' tracked';

  list.innerHTML = meds.map(function(med) {
    var status = getStatus(med);
    var statusLabel = getStatusLabel(med);
    var pct = med.startCount > 0 ? Math.max(0, Math.min(100, (med.currentCount / med.startCount) * 100)) : 0;
    var circ = 2 * Math.PI * 28;
    var offset = circ - (pct / 100) * circ;
    var strokeColor = status === 'good' ? 'var(--accent)' : status === 'warning' ? 'var(--warning)' : 'var(--danger)';
    var alert = getOrderAlert(med);
    var freq = med.frequency || 1;
    var freqLabel = freq === 1 ? '1× daily' : freq === 2 ? '2× daily' : freq === 3 ? '3× daily' : freq === 0.5 ? 'Every other day' : freq + '× daily';

    return '<div class="med-card status-' + status + '">' +
      '<div class="med-top">' +
        '<div>' +
          '<div class="med-name">' + esc(med.name) + '</div>' +
          '<div class="med-dose">' + esc(med.dosage || '') + ' · ' + freqLabel + '</div>' +
        '</div>' +
        '<div class="med-actions">' +
          '<button class="icon-btn" onclick="openHistory(\'' + med.id + '\')" title="History">📋</button>' +
          '<button class="icon-btn" onclick="editMed(\'' + med.id + '\')" title="Edit">✏️</button>' +
          '<button class="icon-btn delete" onclick="deleteMed(\'' + med.id + '\')" title="Delete">🗑</button>' +
        '</div>' +
      '</div>' +
      '<div class="med-body">' +
        '<div class="ring-wrap">' +
          '<svg viewBox="0 0 64 64">' +
            '<circle class="ring-bg" cx="32" cy="32" r="28"/>' +
            '<circle class="ring-fg" cx="32" cy="32" r="28" stroke="' + strokeColor + '" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '"/>' +
          '</svg>' +
          '<div class="ring-label">' +
            '<div class="ring-count">' + med.currentCount + '</div>' +
            '<div class="ring-unit">doses</div>' +
          '</div>' +
        '</div>' +
        '<div class="med-info">' +
          '<div class="info-row"><span class="info-label">Started</span><span class="info-value">' + med.startCount + ' doses · ' + formatDate(med.dateAdded) + '</span></div>' +
          '<div class="info-row"><span class="info-label">Lead Time</span><span class="info-value">' + (med.leadTime || 0) + ' days</span></div>' +
          '<div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge ' + statusLabel.class + '">' + statusLabel.text + '</span></span></div>' +
        '</div>' +
      '</div>' +
      '<div class="dose-controls">' +
        '<button class="dose-btn take" onclick="takeDose(\'' + med.id + '\')"><span class="emoji">➖</span> Took Dose</button>' +
        '<button class="dose-btn add" onclick="addDose(\'' + med.id + '\')"><span class="emoji">➕</span> Add Dose</button>' +
      '</div>' +
      (alert ? '<div class="order-alert ' + alert.class + '">' + alert.text + '</div>' : '') +
    '</div>';
  }).join('');
}

function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Frequency selector
document.querySelectorAll('.freq-opt').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.freq-opt').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('medFreqCustom').value = '';
  });
});

document.getElementById('medFreqCustom').addEventListener('input', function() {
  if (this.value) {
    document.querySelectorAll('.freq-opt').forEach(function(b) { b.classList.remove('active'); });
  }
});

function getSelectedFreq() {
  var active = document.querySelector('.freq-opt.active');
  var custom = document.getElementById('medFreqCustom').value;
  if (custom) return parseFloat(custom);
  if (active) return parseFloat(active.dataset.val);
  return 1;
}

function setFreqUI(val) {
  document.querySelectorAll('.freq-opt').forEach(function(b) {
    b.classList.toggle('active', parseFloat(b.dataset.val) === val);
  });
  var isPreset = [1,2,3].includes(val);
  document.getElementById('medFreqCustom').value = isPreset ? '' : val;
}

function openAddModal() {
  document.getElementById('editId').value = '';
  document.getElementById('medForm').reset();
  document.getElementById('medDate').value = todayISO();
  document.getElementById('modalTitle').textContent = 'Add Medication';
  document.getElementById('submitBtn').textContent = 'Add Medication';
  document.querySelectorAll('.freq-opt').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.freq-opt[data-val="1"]').classList.add('active');
  document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

function editMed(id) {
  var meds = loadMeds();
  var med = meds.find(function(m) { return m.id === id; });
  if (!med) return;
  document.getElementById('editId').value = id;
  document.getElementById('medName').value = med.name;
  document.getElementById('medDosage').value = med.dosage || '';
  document.getElementById('medCount').value = med.currentCount;
  document.getElementById('medLeadTime').value = med.leadTime || 0;
  document.getElementById('medDate').value = med.dateAdded || todayISO();
  setFreqUI(med.frequency || 1);
  document.getElementById('modalTitle').textContent = 'Edit Medication';
  document.getElementById('submitBtn').textContent = 'Save Changes';
  document.getElementById('addModal').classList.add('active');
}

function saveMed(e) {
  e.preventDefault();
  var meds = loadMeds();
  var editId = document.getElementById('editId').value;
  var name = document.getElementById('medName').value.trim();
  var dosage = document.getElementById('medDosage').value.trim();
  var count = parseInt(document.getElementById('medCount').value) || 0;
  var leadTime = parseInt(document.getElementById('medLeadTime').value) || 0;
  var dateAdded = document.getElementById('medDate').value;
  var frequency = getSelectedFreq();

  if (editId) {
    var med = meds.find(function(m) { return m.id === editId; });
    if (med) {
      var oldCount = med.currentCount;
      med.name = name;
      med.dosage = dosage;
      med.currentCount = count;
      med.leadTime = leadTime;
      med.dateAdded = dateAdded;
      med.frequency = frequency;
      if (count !== oldCount) {
        med.history.push({ action: 'edited', from: oldCount, to: count, date: new Date().toISOString() });
      }
    }
  } else {
    meds.push({
      id: genId(), name: name, dosage: dosage, startCount: count,
      currentCount: count, leadTime: leadTime, frequency: frequency,
      dateAdded: dateAdded,
      history: [{ action: 'created', count: count, date: new Date().toISOString() }]
    });
  }

  saveMeds(meds);
  closeAddModal();
  renderMeds();
}

function takeDose(id) {
  var meds = loadMeds();
  var med = meds.find(function(m) { return m.id === id; });
  if (!med || med.currentCount <= 0) return;
  med.currentCount--;
  med.history.push({ action: 'took', count: 1, remaining: med.currentCount, date: new Date().toISOString() });
  saveMeds(meds);
  renderMeds();
}

function addDose(id) {
  var meds = loadMeds();
  var med = meds.find(function(m) { return m.id === id; });
  if (!med) return;
  med.currentCount++;
  med.history.push({ action: 'added', count: 1, remaining: med.currentCount, date: new Date().toISOString() });
  saveMeds(meds);
  renderMeds();
}

function deleteMed(id) {
  if (!confirm('Delete this medication?')) return;
  var meds = loadMeds().filter(function(m) { return m.id !== id; });
  saveMeds(meds);
  renderMeds();
}

function openHistory(id) {
  var meds = loadMeds();
  var med = meds.find(function(m) { return m.id === id; });
  if (!med) return;
  document.getElementById('historyTitle').textContent = med.name + ' History';
  var list = document.getElementById('historyList');

  if (!med.history || med.history.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">No history yet</div>';
  } else {
    list.innerHTML = med.history.slice().reverse().map(function(h) {
      var label = '', cls = '';
      if (h.action === 'created') { label = 'Started with ' + h.count + ' doses'; cls = 'added'; }
      else if (h.action === 'took') { label = 'Took 1 dose (' + h.remaining + ' left)'; cls = 'took'; }
      else if (h.action === 'added') { label = 'Added 1 dose (' + h.remaining + ' left)'; cls = 'added'; }
      else if (h.action === 'edited') { label = 'Edited: ' + h.from + ' → ' + h.to + ' doses'; cls = 'added'; }
      else { label = h.action; }
      var d = new Date(h.date);
      var dateStr = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
      var timeStr = d.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
      return '<div class="history-item"><span class="history-action ' + cls + '">' + label + '</span><span class="history-date">' + dateStr + ' · ' + timeStr + '</span></div>';
    }).join('');
  }

  document.getElementById('historyModal').classList.add('active');
}

function closeHistoryModal() {
  document.getElementById('historyModal').classList.remove('active');
}

// Close modals on overlay click
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
document.getElementById('historyModal').addEventListener('click', function(e) {
  if (e.target === this) closeHistoryModal();
});

// Init
renderMeds();
</script>
</body>
</html>
