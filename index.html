<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Med Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141821">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Med Tracker">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="format-detection" content="telephone=no">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #141821;
  --surface: #1C2130;
  --card: #232838;
  --card-hover: #2A3045;
  --border: #2E3448;
  --text: #E4E7EE;
  --text-dim: #7A8199;
  --teal: #3DD6C8;
  --teal-dim: rgba(61,214,200,0.10);
  --teal-mid: rgba(61,214,200,0.20);
  --amber: #F0B957;
  --amber-dim: rgba(240,185,87,0.10);
  --coral: #EF6B6B;
  --coral-dim: rgba(239,107,107,0.10);
  --r: 14px;
  --r-sm: 10px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(90px + var(--safe-b));
  -webkit-user-select:none;user-select:none;
}
input,textarea,select{-webkit-user-select:auto;user-select:auto}

.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(20,24,33,0.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:calc(14px + var(--safe-t)) 20px 14px;
}
.hdr h1{
  font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;
  letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;
}
.hdr .pill-icon{
  width:28px;height:28px;border-radius:8px;
  background:var(--teal-dim);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.hdr-sub{font-size:11px;color:var(--text-dim);margin-top:2px;letter-spacing:0.2px}

.stats{
  display:flex;gap:8px;padding:12px 20px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.stats::-webkit-scrollbar{display:none}
.stat-chip{
  flex-shrink:0;padding:8px 14px;border-radius:var(--r-sm);
  background:var(--surface);border:1px solid var(--border);
  font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.stat-chip .dot{width:7px;height:7px;border-radius:50%}
.stat-chip .dot.g{background:var(--teal)}
.stat-chip .dot.w{background:var(--amber)}
.stat-chip .dot.d{background:var(--coral)}

.wrap{padding:0 16px;max-width:600px;margin:0 auto}
.section-hdr{
  display:flex;align-items:center;gap:8px;
  padding:18px 4px 10px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px;
}
.section-hdr .sec-icon{font-size:14px;opacity:0.7}
.section-hdr .sec-count{
  margin-left:auto;font-size:11px;font-weight:500;
  background:var(--surface);padding:2px 8px;border-radius:20px;color:var(--text-dim);
}

.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;
}
.card.flash{animation:flashPulse 0.4s ease}
@keyframes flashPulse{0%{border-color:var(--teal)}100%{border-color:var(--border)}}
.card-main{padding:14px 16px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-name{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.2px}
.card-dosage{font-size:12px;color:var(--text-dim);margin-top:1px}
.card-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;
  padding:3px 8px;border-radius:6px;
}
.card-badge.g{background:var(--teal-dim);color:var(--teal)}
.card-badge.w{background:var(--amber-dim);color:var(--amber)}
.card-badge.d{background:var(--coral-dim);color:var(--coral)}

.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-bar{flex:1;height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.prog-fill.g{background:var(--teal)}
.prog-fill.w{background:var(--amber)}
.prog-fill.d{background:var(--coral)}
.prog-num{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;min-width:36px;text-align:right}
.prog-of{font-size:11px;color:var(--text-dim)}

.info-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surface);color:var(--text-dim);font-weight:500}
.chip.refill-soon{background:var(--amber-dim);color:var(--amber)}
.chip.refill-now{background:var(--coral-dim);color:var(--coral)}

.card-actions{display:flex;border-top:1px solid var(--border)}
.act-btn{
  flex:1;height:44px;border:none;background:transparent;
  color:var(--text-dim);font-size:13px;font-weight:600;
  font-family:'Plus Jakarta Sans',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.15s;
}
.act-btn+.act-btn{border-left:1px solid var(--border)}
.act-btn.primary{color:var(--teal);background:var(--teal-dim)}
.act-btn:active{opacity:0.7}
.act-btn .ic{font-size:15px}

.fab{
  position:fixed;bottom:calc(24px + var(--safe-b));right:20px;
  height:52px;padding:0 22px;border-radius:26px;
  background:var(--teal);color:var(--bg);border:none;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 24px rgba(61,214,200,0.3);
  z-index:100;transition:transform 0.2s;
}
.fab:active{transform:scale(0.95)}
.fab .plus{font-size:20px;font-weight:400}

.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(10,12,18,0.6);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92dvh;
  overflow-y:auto;padding:20px 20px calc(32px + var(--safe-b));
  animation:sheetUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-bar{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700}
.modal-x{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}

.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.fi{
  width:100%;height:46px;padding:0 14px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--card);color:var(--text);
  font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;
  outline:none;transition:border-color 0.2s;-webkit-appearance:none;
}
.fi:focus{border-color:var(--teal)}
.fi::placeholder{color:var(--text-dim);opacity:0.5}
.fi-hint{font-size:10px;color:var(--text-dim);margin-top:3px}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.tod-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tod-btn{
  height:40px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:10px;font-weight:600;
  font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.3px;
}
.tod-btn .tod-ic{font-size:14px}
.tod-btn.active{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.tod-btn:active{transform:scale(0.95)}

.freq-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.freq-btn{
  height:40px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:12px;font-weight:600;
  font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.15s;
}
.freq-btn.active{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}

.submit{
  width:100%;height:50px;border-radius:var(--r-sm);border:none;
  background:var(--teal);color:var(--bg);
  font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;
  cursor:pointer;margin-top:6px;transition:opacity 0.2s;
}
.submit:active{opacity:0.85}

.hist-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;
}
.hist-act{font-weight:600}
.hist-act.took{color:var(--coral)}
.hist-act.added{color:var(--teal)}
.hist-dt{color:var(--text-dim);font-size:11px}

.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-ic{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-t{font-family:'Outfit',sans-serif;font-size:17px;color:var(--text);margin-bottom:6px;font-weight:600}
.empty-s{font-size:13px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <h1><span class="pill-icon">💊</span> Med Tracker</h1>
  <div class="hdr-sub" id="hdrSub"></div>
</div>
<div class="stats" id="statsBar"></div>
<div class="wrap" id="app"></div>
<button class="fab" onclick="openAdd()"><span class="plus">+</span> Add Med</button>

<div class="overlay" id="addOvr">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="mTitle">Add Medication</div>
      <button class="modal-x" onclick="closeAdd()">✕</button>
    </div>
    <form id="mForm" onsubmit="save(event)">
      <input type="hidden" id="editId">
      <div class="fg">
        <label class="fl">Medication Name</label>
        <input class="fi" id="fName" placeholder="e.g. Vyvanse" required autocomplete="off">
      </div>
      <div class="fi-row">
        <div class="fg">
          <label class="fl">Dosage</label>
          <input class="fi" id="fDose" placeholder="e.g. 60mg" autocomplete="off">
        </div>
        <div class="fg">
          <label class="fl">Count on Hand</label>
          <input class="fi" id="fCount" type="number" min="0" placeholder="e.g. 30" required>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Time of Day</label>
        <div class="tod-grid" id="todGrid">
          <button type="button" class="tod-btn" data-val="morning"><span class="tod-ic">🌅</span>AM</button>
          <button type="button" class="tod-btn" data-val="midday"><span class="tod-ic">☀️</span>Mid</button>
          <button type="button" class="tod-btn" data-val="evening"><span class="tod-ic">🌇</span>PM</button>
          <button type="button" class="tod-btn" data-val="night"><span class="tod-ic">🌙</span>Night</button>
          <button type="button" class="tod-btn" data-val="asneeded"><span class="tod-ic">⚡</span>PRN</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Frequency</label>
        <div class="freq-row" id="freqGrid">
          <button type="button" class="freq-btn" data-val="1">1× / day</button>
          <button type="button" class="freq-btn" data-val="2">2× / day</button>
          <button type="button" class="freq-btn" data-val="3">3× / day</button>
        </div>
        <input class="fi" id="fFreqC" type="number" min="0.1" step="0.01" placeholder="Custom (e.g. 0.29 for 2×/week)" style="margin-top:8px">
      </div>
      <div class="fi-row">
        <div class="fg">
          <label class="fl">Lead Time (days)</label>
          <input class="fi" id="fLead" type="number" min="0" value="7" placeholder="7">
          <div class="fi-hint">Order → delivery time</div>
        </div>
        <div class="fg">
          <label class="fl">Date Added</label>
          <input class="fi" id="fDate" type="date" required>
        </div>
      </div>
      <button type="submit" class="submit" id="submitBtn">Add Medication</button>
    </form>
  </div>
</div>

<div class="overlay" id="histOvr">
  <div class="modal">
    <div class="modal-bar"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="histTitle">History</div>
      <button class="modal-x" onclick="closeHist()">✕</button>
    </div>
    <div id="histList"></div>
  </div>
</div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});

var SK='medTracker_v2';
function load(){try{return JSON.parse(localStorage.getItem(SK))||[]}catch(e){return[]}}
function store(m){localStorage.setItem(SK,JSON.stringify(m))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function td(){return new Date().toISOString().split('T')[0]}
function fmtD(s){if(!s)return'\u2014';var d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-CA',{month:'short',day:'numeric'})}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

var TOD={morning:{label:'Morning',icon:'\uD83C\uDF05',order:0},midday:{label:'Midday',icon:'\u2600\uFE0F',order:1},evening:{label:'Evening',icon:'\uD83C\uDF07',order:2},night:{label:'Night',icon:'\uD83C\uDF19',order:3},asneeded:{label:'As Needed',icon:'\u26A1',order:4}};

function st(m){var f=m.frequency||1,dl=f>0?m.currentCount/f:9999,lt=m.leadTime||0;if(m.currentCount<=0)return'd';if(dl<=lt)return'd';if(dl<=lt+7)return'w';return'g'}
function stTxt(m){var f=m.frequency||1,dl=f>0?Math.floor(m.currentCount/f):9999,lt=m.leadTime||0;if(m.currentCount<=0)return'OUT';if(dl<=lt)return'ORDER NOW';if(dl<=lt+7)return'LOW';return dl+'d'}
function rfBy(m){var f=m.frequency||1;if(f<=0||!(m.leadTime>0))return null;var dl=Math.floor(m.currentCount/f),oi=dl-(m.leadTime||0);if(oi<0)oi=0;var d=new Date();d.setDate(d.getDate()+oi);return{days:oi,date:d.toLocaleDateString('en-CA',{month:'short',day:'numeric'})}}

function render(){
  var meds=load(),app=document.getElementById('app'),sub=document.getElementById('hdrSub'),bar=document.getElementById('statsBar');
  if(!meds.length){
    app.innerHTML='<div class="empty"><div class="empty-ic">\uD83D\uDC8A</div><div class="empty-t">No medications</div><div class="empty-s">Tap + Add Med to get started</div></div>';
    sub.textContent='No medications tracked';bar.innerHTML='';return;
  }
  var gc=0,wc=0,dc=0;
  meds.forEach(function(m){var s=st(m);if(s==='g')gc++;if(s==='w')wc++;if(s==='d')dc++});
  sub.textContent=meds.length+' med'+(meds.length!==1?'s':'')+' \u00B7 '+new Date().toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
  bar.innerHTML='<div class="stat-chip"><span class="dot g"></span>'+gc+' Good</div>'+(wc?'<div class="stat-chip"><span class="dot w"></span>'+wc+' Low</div>':'')+(dc?'<div class="stat-chip"><span class="dot d"></span>'+dc+' Action</div>':'');

  var groups={};
  meds.forEach(function(m){var t=m.timeOfDay||'morning';if(!groups[t])groups[t]=[];groups[t].push(m)});
  var keys=Object.keys(groups).sort(function(a,b){return(TOD[a]?TOD[a].order:9)-(TOD[b]?TOD[b].order:9)});

  var h='';
  keys.forEach(function(k){
    var meta=TOD[k]||{label:k,icon:'\uD83D\uDC8A',order:9},list=groups[k];
    h+='<div class="section-hdr"><span class="sec-icon">'+meta.icon+'</span>'+meta.label+'<span class="sec-count">'+list.length+'</span></div>';
    list.forEach(function(m){
      var s=st(m),txt=stTxt(m);
      var pct=m.startCount>0?Math.max(0,Math.min(100,(m.currentCount/m.startCount)*100)):0;
      var f=m.frequency||1;
      var fl=f===1?'1\u00D7/day':f===2?'2\u00D7/day':f===3?'3\u00D7/day':f===0.5?'Every other day':f<1?(Math.round(f*7)+'\u00D7/wk'):f+'\u00D7/day';
      var rf=rfBy(m),rc='';
      if(rf){if(rf.days<=0)rc='refill-now';else if(rf.days<=7)rc='refill-soon'}
      h+='<div class="card" id="card-'+m.id+'"><div class="card-main">';
      h+='<div class="card-top"><div><div class="card-name">'+esc(m.name)+'</div>';
      h+='<div class="card-dosage">'+esc(m.dosage||'\u2014')+' \u00B7 '+fl+'</div></div>';
      h+='<span class="card-badge '+s+'">'+txt+'</span></div>';
      h+='<div class="prog-row"><div class="prog-bar"><div class="prog-fill '+s+'" style="width:'+pct+'%"></div></div>';
      h+='<span class="prog-num">'+m.currentCount+'</span><span class="prog-of">/ '+m.startCount+'</span></div>';
      h+='<div class="info-chips"><span class="chip">Added '+fmtD(m.dateAdded)+'</span>';
      if(rf)h+='<span class="chip '+rc+'">'+(rf.days<=0?'\uD83D\uDEA8 Refill now':'\uD83D\uDCC5 Refill by '+rf.date)+'</span>';
      h+='</div></div>';
      h+='<div class="card-actions">';
      h+='<button class="act-btn primary" onclick="take(\''+m.id+'\')"><span class="ic">\uD83D\uDC8A</span> Took Dose</button>';
      h+='<button class="act-btn" onclick="addD(\''+m.id+'\')"><span class="ic">\uFF0B</span> Refill</button>';
      h+='<button class="act-btn" onclick="openH(\''+m.id+'\')"><span class="ic">\uD83D\uDCCB</span></button>';
      h+='<button class="act-btn" onclick="editM(\''+m.id+'\')"><span class="ic">\u270F\uFE0F</span></button>';
      h+='<button class="act-btn" onclick="delM(\''+m.id+'\')"><span class="ic">\uD83D\uDDD1</span></button>';
      h+='</div></div>';
    });
  });
  app.innerHTML=h;
}

function take(id){
  var meds=load(),m=meds.find(function(x){return x.id===id});
  if(!m||m.currentCount<=0)return;
  m.currentCount--;
  m.history.push({action:'took',count:1,remaining:m.currentCount,date:new Date().toISOString()});
  store(meds);render();
  var el=document.getElementById('card-'+id);
  if(el){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash')}
}
function addD(id){
  var amt=prompt('How many doses to add?','1');
  if(!amt)return;amt=parseInt(amt);if(isNaN(amt)||amt<=0)return;
  var meds=load(),m=meds.find(function(x){return x.id===id});if(!m)return;
  m.currentCount+=amt;if(m.currentCount>m.startCount)m.startCount=m.currentCount;
  m.history.push({action:'added',count:amt,remaining:m.currentCount,date:new Date().toISOString()});
  store(meds);render();
}
function delM(id){if(!confirm('Delete this medication?'))return;store(load().filter(function(x){return x.id!==id}));render()}

document.querySelectorAll('.tod-btn').forEach(function(b){
  b.addEventListener('click',function(){document.querySelectorAll('.tod-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active')});
});
document.querySelectorAll('.freq-btn').forEach(function(b){
  b.addEventListener('click',function(){document.querySelectorAll('.freq-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');document.getElementById('fFreqC').value=''});
});
document.getElementById('fFreqC').addEventListener('input',function(){if(this.value)document.querySelectorAll('.freq-btn').forEach(function(x){x.classList.remove('active')})});

function gFreq(){var a=document.querySelector('.freq-btn.active'),c=document.getElementById('fFreqC').value;if(c)return parseFloat(c);if(a)return parseFloat(a.dataset.val);return 1}
function gTod(){var a=document.querySelector('.tod-btn.active');return a?a.dataset.val:'morning'}

function openAdd(){
  document.getElementById('editId').value='';document.getElementById('mForm').reset();
  document.getElementById('fDate').value=td();document.getElementById('fLead').value='7';
  document.getElementById('mTitle').textContent='Add Medication';
  document.getElementById('submitBtn').textContent='Add Medication';
  document.querySelectorAll('.tod-btn,.freq-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelector('.tod-btn[data-val="morning"]').classList.add('active');
  document.querySelector('.freq-btn[data-val="1"]').classList.add('active');
  document.getElementById('addOvr').classList.add('open');
}
function closeAdd(){document.getElementById('addOvr').classList.remove('open')}

function editM(id){
  var meds=load(),m=meds.find(function(x){return x.id===id});if(!m)return;
  document.getElementById('editId').value=id;
  document.getElementById('fName').value=m.name;
  document.getElementById('fDose').value=m.dosage||'';
  document.getElementById('fCount').value=m.currentCount;
  document.getElementById('fLead').value=m.leadTime||0;
  document.getElementById('fDate').value=m.dateAdded||td();
  document.querySelectorAll('.tod-btn').forEach(function(b){b.classList.toggle('active',b.dataset.val===(m.timeOfDay||'morning'))});
  var fv=m.frequency||1;
  document.querySelectorAll('.freq-btn').forEach(function(b){b.classList.toggle('active',parseFloat(b.dataset.val)===fv)});
  if(![1,2,3].includes(fv)){document.querySelectorAll('.freq-btn').forEach(function(b){b.classList.remove('active')});document.getElementById('fFreqC').value=fv}
  else{document.getElementById('fFreqC').value=''}
  document.getElementById('mTitle').textContent='Edit Medication';
  document.getElementById('submitBtn').textContent='Save Changes';
  document.getElementById('addOvr').classList.add('open');
}

function save(e){
  e.preventDefault();var meds=load(),eid=document.getElementById('editId').value;
  var nm=document.getElementById('fName').value.trim(),ds=document.getElementById('fDose').value.trim();
  var ct=parseInt(document.getElementById('fCount').value)||0,lt=parseInt(document.getElementById('fLead').value)||0;
  var dt=document.getElementById('fDate').value,fr=gFreq(),tod=gTod();
  if(eid){
    var m=meds.find(function(x){return x.id===eid});
    if(m){var oc=m.currentCount;m.name=nm;m.dosage=ds;m.currentCount=ct;m.leadTime=lt;m.dateAdded=dt;m.frequency=fr;m.timeOfDay=tod;
      if(ct!==oc)m.history.push({action:'edited',from:oc,to:ct,date:new Date().toISOString()})}
  }else{
    meds.push({id:gid(),name:nm,dosage:ds,startCount:ct,currentCount:ct,leadTime:lt,frequency:fr,timeOfDay:tod,dateAdded:dt,history:[{action:'created',count:ct,date:new Date().toISOString()}]});
  }
  store(meds);closeAdd();render();
}

function openH(id){
  var meds=load(),m=meds.find(function(x){return x.id===id});if(!m)return;
  document.getElementById('histTitle').textContent=m.name+' History';
  var el=document.getElementById('histList');
  if(!m.history||!m.history.length){el.innerHTML='<div style="text-align:center;color:var(--text-dim);padding:24px;font-size:13px">No history yet</div>';
  }else{
    el.innerHTML=m.history.slice().reverse().map(function(h){
      var lbl='',cls='';
      if(h.action==='created'){lbl='Started with '+h.count+' doses';cls='added'}
      else if(h.action==='took'){lbl='Took dose \u2192 '+h.remaining+' left';cls='took'}
      else if(h.action==='added'){lbl='Added '+h.count+' \u2192 '+h.remaining+' left';cls='added'}
      else if(h.action==='edited'){lbl='Edited: '+h.from+' \u2192 '+h.to;cls='added'}
      else{lbl=h.action}
      var d=new Date(h.date);
      return'<div class="hist-item"><span class="hist-act '+cls+'">'+lbl+'</span><span class="hist-dt">'+d.toLocaleDateString('en-CA',{month:'short',day:'numeric'})+' \u00B7 '+d.toLocaleTimeString('en-CA',{hour:'numeric',minute:'2-digit'})+'</span></div>';
    }).join('');
  }
  document.getElementById('histOvr').classList.add('open');
}
function closeHist(){document.getElementById('histOvr').classList.remove('open')}

document.getElementById('addOvr').addEventListener('click',function(e){if(e.target===this)closeAdd()});
document.getElementById('histOvr').addEventListener('click',function(e){if(e.target===this)closeHist()});
